  <text x="40" y="233" fill="#374151" font-size="10" text-anchor="end">6</text>
  <text x="88" y="233" fill="#7c3aed" font-size="11">if</text>
  <text x="106" y="233" fill="#94a3b8" font-size="11">price</text>
  <text x="136" y="233" fill="#94a3b8" font-size="11">&lt;</text>
  <text x="144" y="233" fill="#c4b5fd" font-size="11">0</text>
  <text x="152" y="233" fill="#94a3b8" font-size="11">:</text>
  <text x="40" y="251" fill="#374151" font-size="10" text-anchor="end">7</text>
  <text x="104" y="251" fill="#7c3aed" font-size="11">raise</text>
  <text x="136" y="251" fill="#fbbf24" font-size="11">ValueError</text>
  <text x="200" y="251" fill="#94a3b8" font-size="11">(</text>
