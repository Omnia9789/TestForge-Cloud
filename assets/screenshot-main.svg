  <text x="672" y="335" fill="#94a3b8" font-size="11">assert</text>
  <text x="714" y="335" fill="#fbbf24" font-size="11">calculate_discount</text>
  <text x="826" y="335" fill="#94a3b8" font-size="11">(price, rate) == exp</text>
  <text x="624" y="359" fill="#374151" font-size="10" text-anchor="end">17</text>
  <text x="656" y="359" fill="#7c3aed" font-size="11" opacity="0.7">def</text>
