  <text x="624" y="257" fill="#374151" font-size="10" text-anchor="end">8</text>
  <text x="672" y="257" fill="#94a3b8" font-size="11">assert</text>
  <text x="714" y="257" fill="#fbbf24" font-size="11">calculate_discount</text>
  <text x="826" y="257" fill="#94a3b8" font-size="11">(100, 0.5) ==</text>
  <text x="906" y="257" fill="#c4b5fd" font-size="11">50.0</text>
  <text x="624" y="281" fill="#374151" font-size="10" text-anchor="end">11</text>
  <text x="656" y="281" fill="#94a3b8" font-size="11">@pytest.mark.</text>
  <text x="748" y="281" fill="#fbbf24" font-size="11">parametrize</text>
  <text x="818" y="281" fill="#94a3b8" font-size="11">(</text>
  <text x="822" y="281" fill="#86efac" font-size="11">"price,rate,exp"</text>
  <text x="928" y="281" fill="#94a3b8" font-size="11">, [</text>
  <text x="624" y="299" fill="#374151" font-size="10" text-anchor="end">12</text>
  <text x="672" y="299" fill="#94a3b8" font-size="11">(100, 0.1, 90.0), (0, 0.5, 0.0), (200, 1.0, 0.0)])</text>
  <text x="624" y="317" fill="#374151" font-size="10" text-anchor="end">13</text>
  <text x="656" y="317" fill="#7c3aed" font-size="11">def</text>
