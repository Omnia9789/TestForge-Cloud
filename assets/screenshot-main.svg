  <text x="72" y="143" fill="#7c3aed" font-size="11">def</text>
  <text x="96" y="143" fill="#60a5fa" font-size="11">calculate_discount</text>
  <text x="222" y="143" fill="#94a3b8" font-size="11">(price, rate):</text>
  <text x="40" y="161" fill="#374151" font-size="10" text-anchor="end">2</text>
  <text x="88" y="161" fill="#94a3b8" font-size="11" font-style="italic">"""Apply discount rate to price."""</text>
  <text x="40" y="179" fill="#374151" font-size="10" text-anchor="end">3</text>
